<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if mode == 'login' %}Вхід{% else %}Реєстрація{% endif %} | Ex Libris</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f7f5f0; color: #1e293b; height: 100vh; display: flex; align-items: center; }
        h1 { font-family: 'Playfair Display', serif; font-weight: 700; color: #1e293b; }
        .auth-card { background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(27, 38, 59, 0.05); padding: 40px; max-width: 400px; width: 100%; margin: 0 auto; }
        .btn-custom { background-color: #1e293b; color: white; border: none; border-radius: 8px; width: 100%; padding: 12px; font-weight: 500; transition: all 0.2s; }
        .btn-custom:hover { background-color: #0f172a; color: white; }
        .form-control { border-radius: 8px; padding: 10px 15px; border: 1px solid #e2e8f0; }
        .form-control:focus { border-color: #8c7a6b; box-shadow: 0 0 0 3px rgba(140, 122, 107, 0.15); }
        .switch-link { color: #8c7a6b; text-decoration: none; font-size: 0.9rem; }
        .switch-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1 class="text-center mb-2">Ex Libris</h1>
        <p class="text-center text-muted small mb-4">{% if mode == 'login' %}Вхід до бібліотеки{% else %}Створення акаунту{% endif %}</p>

        {% if error %}<div class="alert alert-danger py-2 small">{{ error }}</div>{% endif %}
        {% if msg %}<div class="alert alert-success py-2 small">{{ msg }}</div>{% endif %}

        <form action="{% if mode == 'login' %}/login{% else %}/register{% endif %}" method="POST">
            <div class="mb-3">
                <label class="form-label small text-muted">Ім'я користувача</label>
                <input type="text" name="username" class="form-control" required autocomplete="off">
            </div>
            <div class="mb-4">
                <label class="form-label small text-muted">Пароль</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-custom mb-3">
                {% if mode == 'login' %}Увійти{% else %}Зареєструватися{% endif %}
            </button>
        </form>

        <div class="text-center">
            {% if mode == 'login' %}
                <a href="/register" class="switch-link">Немає акаунту? Зареєструватися</a>
            {% else %}
                <a href="/login" class="switch-link">Вже є акакунт? Увійти</a>
            {% endif %}
        </div>
    </div>
</body>
</html>
