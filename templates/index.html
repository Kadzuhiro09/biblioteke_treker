<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя Особиста Бібліотека</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #f7f5f0; --dark-blue: #1e293b; --accent-color: #8c7a6b; --card-bg: #ffffff;
            --status-wish: #94a3b8; --status-reading: #d97706; --status-done: #15803d;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--dark-blue); padding-bottom: 50px; }
        h1, h2, h3, .book-title { font-family: 'Playfair Display', serif; font-weight: 700; }
        .main-title { color: var(--dark-blue); margin-top: 40px; margin-bottom: 10px; }
        .main-subtitle { font-family: 'Playfair Display', serif; font-style: italic; color: var(--accent-color); margin-bottom: 40px; }
        .custom-card-form { background: var(--card-bg); border: none; border-radius: 16px; box-shadow: 0 4px 20px rgba(27, 38, 59, 0.05); padding: 30px; }
        .form-control, .form-select { border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px 15px; font-size: 0.95rem; transition: all 0.2s ease; }
        .form-control:focus, .form-select:focus { border-color: var(--accent-color); box-shadow: 0 0 0 3px rgba(140, 122, 107, 0.15); }
        .btn-custom-submit { background-color: var(--dark-blue); color: white; border: none; border-radius: 8px; font-weight: 500; transition: all 0.2s ease; }
        .btn-custom-submit:hover { background-color: #0f172a; color: white; transform: translateY(-1px); }
        .book-card { background: var(--card-bg); border: none; border-radius: 16px; box-shadow: 0 4px 15px rgba(27, 38, 59, 0.04); transition: all 0.3s ease; position: relative; overflow: hidden; }
        .book-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(27, 38, 59, 0.08); }
        .book-card::before { content: ''; position: absolute; top: 0; left: 0; bottom: 0; width: 5px; }
        .status-wish::before { background-color: var(--status-wish); }
        .status-reading::before { background-color: var(--status-reading); }
        .status-done::before { background-color: var(--status-done); }
        .book-title { font-size: 1.4rem; color: var(--dark-blue); margin-bottom: 4px; }
        .book-author { font-weight: 500; color: #64748b; }
        .genre-badge { background-color: #f1f5f9; color: #475569; font-weight: 400; padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; }
        .card-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; color: #94a3b8; font-weight: 600; margin-bottom: 4px; display: block; }
        .btn-save-changes { background-color: transparent; border: 1px solid #cbd5e1; color: #64748b; border-radius: 8px; font-size: 0.85rem; font-weight: 500; padding: 6px; transition: all 0.2s; }
        .btn-save-changes:hover { background-color: #f8fafc; border-color: #94a3b8; color: var(--dark-blue); }
        .btn-delete-book { color: #94a3b8; font-size: 0.85rem; text-decoration: none; transition: color 0.2s; }
        .btn-delete-book:hover { color: #ef4444; }

        .user-panel { position: absolute; top: 20px; right: 20px; font-size: 0.9rem; }
        .btn-logout { color: var(--accent-color); text-decoration: none; margin-left: 10px; font-weight: 500; }
        .btn-logout:hover { text-decoration: underline; color: #ef4444; }
    </style>
</head>
<body>

    <div class="container position-relative">

        <!-- Панель користувача -->
        <div class="user-panel">
            <span>Читач: <strong>{{ username }}</strong></span>
            <a href="/logout" class="btn-logout">Вийти</a>
        </div>

        <!-- Заголовок сайту -->
        <div class="text-center">
            <h1 class="main-title">Ex Libris</h1>
            <p class="main-subtitle">ваша особиста літературна полиця</p>
        </div>

        <!-- Форма додавання книги -->
        <div class="custom-card-form mb-5">
            <h5 class="mb-3" style="font-weight: 600;">Додати книгу до колекції</h5>
            <form action="/add" method="POST" class="row g-3">
                <div class="col-md-4">
                    <input type="text" name="title" class="form-control" placeholder="Назва книги" required>
                </div>
                <div class="col-md-3">
                    <input type="text" name="author" class="form-control" placeholder="Автор" required>
                </div>
                <div class="col-md-3">
                    <input type="text" name="genre" class="form-control" placeholder="Жанр (наприклад, Драма)">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-custom-submit w-100 py-2">Додати</button>
                </div>
            </form>
        </div>

        <!-- Книжкова полиця -->
        <h3 class="mb-4" style="position: relative; display: inline-block;">
            Моя полиця
            <span style="position: absolute; bottom: -6px; left: 0; width: 40px; height: 3px; background-color: var(--accent-color);"></span>
        </h3>

        <div class="row row-cols-1 row-cols-md-2 g-4">
            {% for book in books %}
            <div class="col">
                <div class="card h-100 book-card p-3
                    {% if book.status == 'Читаю' %}status-reading
                    {% elif book.status == 'Прочитано' %}status-done
                    {% else %}status-wish{% endif %}">

                    <div class="card-body d-flex flex-column justify-content-between">
                        <div>
                            <div class="book-title">{{ book.title }}</div>
                            <div class="d-flex align-items-center gap-2 mb-3">
                                <span class="book-author">{{ book.author }}</span>
                                {% if book.genre %}
                                <span class="genre-badge">{{ book.genre }}</span>
                                {% endif %}
                            </div>

                            <form action="/update/{{ book.id }}" method="POST" class="mt-2">
                                <div class="row g-2 mb-2">
                                    <div class="col-6">
                                        <label class="card-label">Статус</label>
                                        <select name="status" class="form-select form-select-sm">
                                            <option value="Хочу прочитати" {% if book.status == 'Хочу прочитати' %}selected{% endif %}>Хочу прочитати</option>
                                            <option value="Читаю" {% if book.status == 'Читаю' %}selected{% endif %}>Читаю</option>
                                            <option value="Прочитано" {% if book.status == 'Прочитано' %}selected{% endif %}>Прочитано</option>
                                        </select>
                                    </div>
                                    <div class="col-6">
                                        <label class="card-label">Оцінка (1-5)</label>
                                        <input type="number" name="rating" class="form-control form-control-sm" min="0" max="5" value="{{ book.rating }}">
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="card-label">Нотатки / Враження</label>
                                    <textarea name="review" class="form-control form-control-sm" rows="2" placeholder="Що думаєте про книгу?">{{ book.review or '' }}</textarea>
                                </div>

                                <button type="submit" class="btn btn-save-changes w-100 mb-3">Зберегти зміни</button>
                            </form>
                        </div>

                        <div class="text-end">
                            <form action="/delete/{{ book.id }}" method="POST" onsubmit="return confirm('Ви впевнені, що хочете видалити цю книгу?');">
                                <button type="submit" class="btn btn-link btn-delete-book p-0">Видалити книгу</button>
                            </form>
                        </div>

                    </div>
                </div>
            </div>
            {% else %}
            <div class="col-12 text-center mt-5">
                <p class="text-muted" style="font-style: italic;">Полиця поки порожня. Саме час додати першу книгу!</p>
            </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
